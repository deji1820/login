<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIMC - Disciplinary Services | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #2d2550;
            --dark-navy: #1e1838;
            --gold: #d4a650;
            --light-gold: #f5c563;
            --light: #f8f9fa;
            --white: #ffffff;
        }
        body { font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; background: var(--white); }
        .container { display: flex; height: 100vh; position: relative; }
        .bg-section { flex: 1; position: relative; overflow: hidden; }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            animation: subtleZoom 20s ease-in-out infinite alternate;
            filter: brightness(1.1);
        }
        @keyframes subtleZoom { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.5) 100%);
            backdrop-filter: blur(3px);
        }
        .login-box {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 31, 58, 0.95);
            padding: 60px 50px; border-radius: 2px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            width: 450px;
            border: 1px solid rgba(212, 166, 80, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
        .login-title { font-family: 'Playfair Display', serif; color: var(--light); font-size: 42px; margin-bottom: 15px; letter-spacing: 1px; }
        .login-subtitle { color: rgba(248,249,250,0.8); font-size: 15px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }
        .form-group { margin-bottom: 25px; position: relative; animation: fadeIn 0.8s ease-out; animation-fill-mode: both; }
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(248,249,250,0.4); font-size: 18px; z-index: 1; }
        input {
            width: 100%; padding: 16px 20px 16px 50px;
            background: rgba(248,249,250,0.08);
            border: 1px solid rgba(248,249,250,0.15);
            border-radius: 2px; color: var(--light); font-size: 15px;
            font-family: 'Outfit', sans-serif; transition: all 0.3s ease;
        }
        input::placeholder { color: rgba(248,249,250,0.4); font-weight: 300; }
        input:focus { outline: none; background: rgba(248,249,250,0.12); border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,166,80,0.1); }
        .toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: rgba(248,249,250,0.5); user-select: none; z-index: 2; transition: color 0.2s ease; }
        .toggle-password:hover { color: rgba(248,249,250,0.9); }
        .forgot-password { text-align: right; margin-top: 10px; }
        .forgot-password a { color: var(--gold); text-decoration: none; font-size: 13px; font-weight: 400; transition: all 0.3s ease; }
        .forgot-password a:hover { color: #e8c070; text-decoration: underline; }
        #errorMessage { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; text-align: center; }
        .login-button {
            width: 100%; padding: 16px;
            background: var(--gold); border: none; border-radius: 2px;
            color: var(--navy); font-size: 16px; font-weight: 500;
            font-family: 'Outfit', sans-serif; cursor: pointer;
            margin-top: 30px; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }
        .login-button:hover { background: #e8c070; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,166,80,0.3); }
        .login-button:active { transform: translateY(0); }
        .login-button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .right-panel {
            width: 450px; background: var(--navy);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 40px; position: relative;
            border-left: 1px solid rgba(212,166,80,0.2);
        }
        .logo-box { border: 3px solid var(--gold); padding: 30px 50px; margin-bottom: 40px; animation: fadeIn 0.8s ease-out 0.5s both; }
        .logo-text { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 72px; font-weight: 700; letter-spacing: 8px; text-align: center; }
        .brand-name { color: var(--gold); font-size: 20px; text-align: center; line-height: 1.5; font-weight: 300; }
        .brand-name strong { font-weight: 500; }
        .copyright { position: absolute; bottom: 30px; color: rgba(248,249,250,0.6); font-size: 12px; font-weight: 300; animation: fadeIn 0.8s ease-out 0.7s both; }
        .decorative-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); width: 100%; opacity: 0.3; }
        .decorative-line.top    { top: 0; }
        .decorative-line.bottom { bottom: 0; }
    </style>
</head>

             alt="Background" class="bg-image">
        <div class="bg-overlay"></div>

        <div class="login-box">
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">Welcome to Holy Infant Montessori Center Disciplinary Services Management System</p>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Password" required>
                        <span class="toggle-password" id="togglePassword" onclick="togglePasswordVisibility()">🙈</span>
                    </div>
                    <div class="forgot-password">
                        <a href="https://forgot-pass-theta.vercel.app/">Forgot Password</a>
                    </div>
                </div>

                <div id="errorMessage"></div>

                <button type="submit" class="login-button">Login</button>
            </form>
        </div>
    </div>

    <div class="right-panel">
        <div class="decorative-line top"></div>
        <div class="logo-box">
            <div class="logo-text">HIMC</div>
        </div>
        <div class="brand-name">
            <strong>Holy Infant Montessori Center</strong><br>
            Disciplinary Services
        </div>
        <div class="copyright">Copyright All Rights Reserved 2025</div>
        <div class="decorative-line bottom"></div>
    </div>
</div>

<script>
    const PORTALS = {
        do:       'https://d-oview.vercel.app/',
        it:       'https://it-personnel-view.vercel.app/',
        teacher:  'https://teacher-view.vercel.app/',
        guidance: 'https://guidance-view.vercel.app/',
    };

    const STAFF_USERS = [
        { email: 'himc@gmail.com',         password: '12345', portal: 'do'       },
        { email: 'it.himc@gmail.com',       password: '12345', portal: 'it'       },
        { email: 'guidance.himc@gmail.com', password: '12345', portal: 'guidance' },
    ];

    const API_BASE = 'https://tabularly-tactless-deloras.ngrok-free.dev';

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const errorEl  = document.getElementById('errorMessage');
        const btn      = document.querySelector('.login-button');

        errorEl.style.display = 'none';

        const staffMatch = STAFF_USERS.find(u => u.email === email && u.password === password);
        if (staffMatch) {
            window.location.href = PORTALS[staffMatch.portal];
            return;
        }

        btn.textContent = 'Logging in…';
        btn.disabled    = true;

        try {
            const teacherRes = await fetch(`${API_BASE}/teacher_login.php`, {
                method:  'POST',
                headers: {
                    'Content-Type':             'application/json',
                    'ngrok-skip-browser-warning': 'true',
                },
                body: JSON.stringify({ email, password }),
            });

            if (teacherRes.ok) {
                const teacherData = await teacherRes.json();

                if (teacherData.success) {
                    window.location.href =
                        `${PORTALS.teacher}?id=${teacherData.teacher_id}` +
                        `&name=${encodeURIComponent(teacherData.full_name)}` +
                        `&email=${encodeURIComponent(teacherData.email)}` +
                        `&first_login=${teacherData.is_first_login ? '1' : '0'}`;
                    return;
                }
            }

            const studentRes = await fetch(`${API_BASE}/student_login.php`, {
                method:  'POST',
                headers: {
                    'Content-Type':             'application/json',
                    'ngrok-skip-browser-warning': 'true',
                },
                body: JSON.stringify({ email, password }),
            });

            const studentData = await studentRes.json();

            if (studentData.success) {
                window.location.href =
                    `https://studentview-two.vercel.app/?id=${studentData.student_number}`;
                return;
            }

            showError('Invalid email or password.');

        } catch (err) {
            showError('Network error. Please try again.');
        } finally {
            btn.textContent = 'LOGIN';
            btn.disabled    = false;
        }
    });

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent   = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function togglePasswordVisibility() {
        const input = document.getElementById('password');
        const icon  = document.getElementById('togglePassword');
        const isHidden = input.type === 'password';
        input.type       = isHidden ? 'text'  : 'password';
        icon.textContent = isHidden ? '👁️' : '🙈';
    }
</script>
</body>
</html>
